    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .filter a:active,
      .filter a:focus {
        background-color: rgb(33, 184, 33);
        color: rgb(233, 226, 226);
      }

      .filter {
        width: 800px;
        margin: 0 auto;
      }

      .filter a {
        display: inline-block;
        padding: 8px 6px;
        background: #f0f0f0;
        margin: 45px 35px;
        cursor: pointer;
        border-radius: 4px;
        color: #333;
      }

      .list {
        /* overflow: hidden; */
        width: 1300px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(6, 1fr);
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .item {
        width: 220px;
        height: 380px;
        border: 1px solid transparent;
        padding: 10px;
      }
      .item:hover {
        border: 1px solid rgb(255, 98, 0);
        box-shadow: 0 0 10px rgb(255, 98, 0);
        border-radius: 15px;
      }

      .items:nth-child(1) {
        width: 202px;
        height: 95%;
        /* background-color: #881c1c; */
        /* text-align: center; */
      }
      .items:nth-child(2) {
        width: 202px;
        height: 5%;
        /* background-color: #881c1c; */
        /* text-align: center; */
      }
      .items1 {
        width: 100%;
        height: 69%;
        /* background-color: #1c8888; */
      }
      .items1 img {
        width: 100%;
        height: 100%;
      }

      .items2 {
        width: 100%;
        height: 12%;
        /* background-color: #88881c; */
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .items2 span {
        font-size: 12px;
        color: rgb(34, 34, 34);
      }

      .items3 {
        width: 100%;
        height: 6%;
        /* background-color: #881c88; */
      }

      .items4 {
        width: 100%;
        height: 6%;
        /* background-color: #1c881c; */
      }

      .items5 {
        width: 100%;
        height: 6%;
        padding-top: 5px;
        /* background-color: #5213e5; */
      }

      .active:hover {
        color: rgb(255, 98, 0);
      }
    </style>
