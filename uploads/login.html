<body>
    <div class="w">
        <header class="header">
            <div class="logo">
                <img src="../images/b2.jpg" alt="">

    <div class="mian">
        <div class="w">
            <div class="login-box">

                <ul class="login-title">
                    <li class="active" data-index="0">账户登录</li>
                    <li data-index="1">二维码登录</li>
                </ul>
                <form action="">
                    <div class="tab_hd">
                        <div class="item">
                            <div class="items">
                                <a href="#">手机验证码登录</a>
                            </div>
                        </div>

                        <div class="item">
                            <div class="ipt"><input type="text" placeholder="请输入手机号" name="userphone"></div>
                            <div class="line">
                                <span></span>
                                <i class="icon"></i>
                            </div>
                        </div>
                        <div class="item">
                            <div class="ipt"><input type="password" placeholder="请输入密码" name="password"></div>
                            <div class="line">
                                <span></span>
                                <i class="icon"></i>
                            </div>
                        </div>
                        <div class="item">
                            <input type="checkbox" class="checkbox">
                            <span>我已阅读并同意
                                <a href="#">《用户协议》</a>
                                和
                                <a href="#">《隐私政策》</a>
                            </span>
                        </div>
                        <div class="item">
                            <div class="longo">
                                <input type="submit" value="登录" class="con">
                            </div>
                        </div>

                        <div class="item">
                            <div class="but">
                                <a href="#">忘记密码？</a>
                                <a href="./register.html">注册账号</a>
                            </div>
                        </div>

                    </div>
                </form>
                <div class="tab_hd" style="display: none; margin-top: 60px;">
                    <img src="../images/er.jpg" alt="" style=" height: 300px;">
                </div>

            </div>
        </div>


    </div>

    <!-- 底部模块 start -->
    <footer class="footer">
        <div class="w">
            <div class="mod_service">

                <div class="item">
                    <h5>1</h5>
                    <div class="mod_service_text">
                        <h4>正品保障</h4>
                    </div>
                </div>
                <div class="item">
                    <h5>2</h5>
                    <div class="mod_service_text">
                        <h4>7天无理由退货</h4>
                    </div>
                </div>
