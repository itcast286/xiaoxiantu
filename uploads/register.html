<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/common.css">

</head>

<body>
    <div class="w">
        <div class="box">
            <h3>新用户注册</h3>
            <div class="register">
                <form action="">
                    <ul>
                        <li>
                            <label for="username">用户名：</label>
                            <input type="text" id="username" name="username">
                            <i class="icon"></i>
                            <span class="err"></span>
                        </li>

                       <li>
                            <label for="phone">手机号：</label>
                            <input type="text" id="phone" name="phone">
                            <i class="icon">×</i>
                            <span class="err">请输入正确的手机号</span>
                        </li>

                        <li style="position: relative;">
                            <label for="code">验证码：</label>
                            <input type="text" id="code" name="code">
                            <button id="get-code" style="position: absolute;left: 220px;top: 8px; border: 0; background-color: #fff; font-size: 8px;"><i style="display: inline-block; width: 60px; height: 20px;">获取验证码</i></button>
                            <i class="icon">×</i>
                            <span class="err">请输入正确的验证码</span>
                        </li>
                        <li>
                            <label for="password">登录密码：</label>
                            <input type="password" id="password" name="password">
                            <i class="icon">×</i>
                            <span class="err">设置登录密码</span>
                        </li>

                        <li>
                            <label for="confirm-password">确认密码：</label>
                            <input type="password" id="confirm-password" name="confirm-password">
                            <i class="icon">×</i>
                            <span class="err">密码错误</span>
                        </li>

                        <li style="margin-left: 100px;">
                            <input type="checkbox" id="checkbox" name="checkbox">
                            <span>已阅读并同意<a href="#">《用户服务协议》</a></span>
                        </li>

                        <li style="margin-left: 100px;">
                            <input type="submit" id="submit" name="submit" value="下一步">
                        </li> 
                    </ul>
                </form>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../js/register.js"></script>
</body>


</html>
